<header class="navbar-shadow p-3 mb-4">
    <div class="container flex justify-content-between align-items-center">
        <a routerLink="/" class="navbar-logo flex align-items-center gap-2">
            <img src="/logo-prompt-hub.png"  alt="Prompt Hub" width="32" height="32">
            <h1 class="text-2xl font-bold">Prompt Hub</h1>
        </a>
        <div class="flex align-items-center gap-2">
            @if (authService.currentUser(); as currentUser) {
                <span class="text-sm text-color-secondary">{{ currentUser.username }}</span>
                <p-button 
                severity="secondary"
                routerLink="/auth" 
                label="Deconnexion" 
                (onClick)="logout()" 
                size="small" />

            } @else {

                <p-button 
                severity="secondary"
                routerLink="/auth" 
                label="Connexion"  
                size="small" />
            }

            <p-button [icon]="isDarkMode() ? 'pi pi-sun' : 'pi pi-moon'" size="small" (onClick)="toggleDarkMode()" />
        </div>
    </div>
</header>
