<p-card>
    <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="field">
            <label for="title">Title</label> 
            <input formControlName="title" id="title" type="text" pInputText class="w-full">
        </div>
        <div class="field">
            <label for="content">Content</label> 
            <textarea formControlName="content" id="content" type="text" pTextarea class="w-full"></textarea>
        </div>
        <div class="field">
            <label for="category">Category</label> 
            <p-select inputId="category" 
                        class="w-full" 
                        optionValue="id" 
                        optionLabel="name" 
                        [options]="categories()"
                        formControlName="categoryId" /> 
        </div>
        <div class="flex justify-content-end gap-2">
            <p-button routerLink="/" label="annuler" onclick="submit()"></p-button>
            <p-button type="submit" label="créer"></p-button>
        </div>
    </form>
</p-card>
