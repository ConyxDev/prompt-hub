<p-card class="mb-3">
    <div class="flex justify-content-between align-items-center">
        <div>
        <h3 class="m-0">{{prompt().title}}</h3> 
        <div class="text-sm text-color-secondary">@{{prompt().author.username }}</div>
        </div>
        <div class="flex gap-2">
        <p-button icon="pi pi-pencil" size="small" [text]="true" />
        <p-button (onClick)="copyToClipboard()" icon="pi pi-copy" size="small" [text]="true" />
        </div>
    </div>
        <textarea pTextarea class="w-full mb-2" rows="8" readonly> {{prompt().content}}</textarea>
    <div class="flex justify-content-between align-items-center">
        <p-tag [value]="prompt().category.name"/>
        <div class="flex gap-2">
            <p-button severity="secondary" icon="pi pi-thumbs-up" size="small"/>
            <span>{{prompt().score}}</span>
            <p-button severity="secondary" icon="pi pi-thumbs-down" size="small"/>
        </div>
    </div>
</p-card>
