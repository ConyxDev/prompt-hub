<p-card [header] ="mode() === 'login' ? 'connexion' : 'Créer un compte' ">
    <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="field">
            <label for="username">Nom d'utilisateur</label>
            <input inputId="username" class="w-full" pInputText type="text" formControlName="username"/>
            <small class="invalid-feedback">Le nom de l'utilisateur est requis</small>
        </div>
        <div class="field">
            <label for="password">Mot de passe</label>
            <p-password inputId="password" class="w-full" formControlName="password"/>
            <small class="invalid-feedback">Le mot de passe est requis</small>

        </div>
        <div class="flex gap-2 justify-content-end">
            <p-button 
            severity="secondary"
            (onClick)="toggleMode()"
            [label] ="mode() === 'login' ? 'Créer un compte' : 'Se connecter' "/>
            <p-button 
            type="submit"
            [label] ="mode() === 'login' ? 'Connexion' : 'Créer le compte' "/>
        </div>
    </form>
</p-card>
